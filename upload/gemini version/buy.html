<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy SHIPEP Token</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        .buy-container {
            max-width: 600px;
            margin: 120px auto 40px;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .buy-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 500;
            color: var(--text-color);
        }

        .form-group input {
            padding: 0.8rem;
            border: 1px solid var(--primary-color);
            border-radius: 8px;
            background-color: var(--background-color);
            color: var(--text-color);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .status-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .status-message.success {
            background-color: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
        }

        .status-message.error {
            background-color: rgba(244, 67, 54, 0.1);
            color: #F44336;
        }

        .token-info {
            margin-bottom: 2rem;
            text-align: center;
        }

        .token-info h2 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .token-address {
            background-color: var(--background-color);
            padding: 0.8rem;
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="/shipep2.png" alt="SHIPEP Logo" class="logo-img">
                <span>SHIPEP</span>
            </div>
            <button class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-links">
                <a href="index.html#home">HOME</a>
                <a href="index.html#about">ABOUT</a>
                <a href="index.html#how-to-buy">HOW TO BUY</a>
                <a href="index.html#tokenomics">TOKENOMICS</a>
                <a href="index.html#roadmap">ROADMAP</a>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 600px; margin: 120px auto 40px;">
        <div style="background-color: var(--card-bg); padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
            <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 2rem;">Buy SHIPEP Token</h2>

            <div class="form-group">
                <button id="connectWallet">Connect Wallet</button>
            </div>

            <div class="form-group" id="deepLinkContainer" style="display: none;">
            </div>

            <div class="form-group">
                <label for="amount">Amount (tokens):</label>
                <input type="number" id="amount" min="1" value="1">
            </div>

            <div class="form-group">
                <button id="buyTokens" disabled>Buy Tokens</button>
            </div>

            <div id="tokenDetails"></div>
            <div id="statusMessage" class="status-message" style="display: none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/buffer@6.0.3/browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/client@2.0.0-beta.100/dist/cjs/index.umd.js"></script>
    <script src="buy.js"></script>
    <script>
        document.querySelector('.mobile-menu-btn').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('show');
        });
    </script>
</body>
</html>
