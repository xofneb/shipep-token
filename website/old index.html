<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShibaPepe Token</title>
	<link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #45a049;
            --background-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .container {
            max-width: 600px;
            margin: 120px auto 40px;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        label {
            font-weight: 500;
            color: var(--text-color);
        }

        input {
            padding: 0.8rem;
            border: 1px solid var(--primary-color);
            border-radius: 8px;
            background-color: var(--background-color);
            color: var(--text-color);
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        button {
            padding: 0.8rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--secondary-color);
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        #tokenDetails {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: var(--background-color);
            border-radius: 8px;
            text-align: center;
        }

        #tokenDetails h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .network-warning {
            color: #f44336;
            font-weight: 500;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: var(--primary-color); margin-bottom: 2rem;">ShibaPepe Token</h1>
        
        <div class="form-group">
            <button id="connectWallet">Connect Wallet</button>
        </div>

        <div class="form-group">
            <label for="amount">Amount (tokens):</label>
            <input type="number" id="amount" min="1" value="1">
        </div>

        <div class="form-group">
            <button id="buyTokens" disabled>Buy Tokens</button>
        </div>

        <div id="tokenDetails"></div>
    </div>

    <!-- Use browser-compatible buffer -->
    <script src="https://cdn.jsdelivr.net/npm/buffer@6.0.3/browser.min.js"></script>
    <!-- Use specific versions for stability -->
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.4.13/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bs58@6.0.0/dist/bs58.min.js"></script>
    <script src="https://solflare.com/install.js"></script>
    <script src="app.js"></script>
</body>
</html>
